site_name: Faxbot Docs
site_url: https://docs.faxbot.net
repo_url: https://github.com/DMontgomery40/Faxbot
repo_name: DMontgomery40/Faxbot
edit_uri: edit/mkdocs/docs/
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
plugins:
  - search
  - mike
  - exclude:
      glob:
        - 'api/admin_ui/node_modules/**'
        - 'api/**/node_modules/**'
        - 'vendor/**'
        - 'node_modules/**'
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md

  - AI Integration: ai-integration/index.md
  - Backends:
    - Phaxio: backends/phaxio-setup.md
    - Sinch: SINCH_SETUP.md
    - SIP/Asterisk: SIP_SETUP.md
  - Security: SECURITY.md
  - Deployment: DEPLOYMENT.md
  - API: API_REFERENCE.md
