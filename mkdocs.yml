site_name: Faxbot Docs
site_url: https://docs.faxbot.net
repo_url: https://github.com/DMontgomery40/Faxbot
repo_name: DMontgomery40/Faxbot
edit_uri: edit/mkdocs/docs/
theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/images/favicon-32x32.png
  logo: assets/images/faxbot_full_logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
plugins:
  - search
  - mike
  - redirects:
      redirect_maps:
        getting-started/index.md: getting-started.md
        getting-started/contributing.md: getting-started/contributing.md
        admin-console/index.md: admin-console.md
        admin-console/setup-wizard.md: admin-console/setup-wizard.md
        admin-console/settings.md: admin-console/settings.md
        admin-console/api-keys.md: admin-console/api-keys.md
        admin-console/diagnostics.md: admin-console/diagnostics.md
        admin-console/plugin-builder.md: admin-console/plugin-builder.md
        admin-console/annotated-demo.md: admin-console/annotated-demo.md
        backends/phaxio-setup.md: setup/phaxio.md
        backends/sinch-setup.md: setup/sinch.md
        backends/sip-setup.md: setup/sip-asterisk.md
        backends/documo-setup.md: setup/documo.md
        backends/signalwire-setup.md: setup/signalwire.md
        backends/freeswitch-setup.md: setup/freeswitch.md
        backends/test-mode.md: setup/test-mode.md
        backends/public-access.md: setup/public-access.md
        backends/webhooks.md: setup/webhooks.md
        backends/images-and-pdfs.md: guides/images-and-pdfs.md
        development/api-reference.md: api.md
        development/node-sdk.md: sdks/node.md
        development/python-sdk.md: sdks/python.md
        development/scripts-and-tests.md: tools/scripts-and-tests.md
        development/troubleshooting.md: troubleshooting.md
        security/hipaa-requirements.md: HIPAA_REQUIREMENTS.md
  - exclude:
      glob:
        - 'api/admin_ui/node_modules/**'
        - 'api/**/node_modules/**'
        - 'vendor/**'
        - 'node_modules/**'
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting started:
    - Overview: getting-started.md
    - Contributing: getting-started/contributing.md
  - Setup:
    - Overview: setup/index.md
    - Backends (Go‑Live): go-live/index.md
    - Phaxio (Cloud): setup/phaxio.md
    - Sinch (Cloud v3): setup/sinch.md
    - SIP/Asterisk (Self‑hosted): setup/sip-asterisk.md
    - Documo (mFax): setup/documo.md
    - SignalWire: setup/signalwire.md
    - FreeSWITCH: setup/freeswitch.md
    - Test Mode: setup/test-mode.md
    - Public Access & Tunnels: setup/public-access.md
    - Webhooks: setup/webhooks.md
    - Deployment: DEPLOYMENT.md
    - Security:
      - Overview: security/index.md
      - Authentication: security/authentication.md
      - OAuth/OIDC Setup: security/oauth-setup.md
  - Reference:
    - Overview: reference/index.md
    - API:
      - Reference: api.md
      - Canonical Events: api/canonical-events.md
    - SDKs: sdks/index.md
    - MCP:
      - Overview: mcp/index.md
      - Node: mcp/node.md
      - Python: mcp/python.md
      - Transports: mcp/transports.md
  - Plugins (v3):
    - Overview: plugins/index.md
    - SIP Provider Plugins: plugins/sip-provider-plugins.md
    - HTTP Manifest Providers: plugins/manifest-http.md
    - Curated Registry: plugins/registry.md
    - Plugin Config File: plugins/config-file.md
    - Home Assistant Sample: plugins/homeassistant.md
  - Operations:
    - Overview: operations/index.md
    - Admin Console:
      - Overview: admin-console.md
      - Setup Wizard: admin-console/setup-wizard.md
      - Settings: admin-console/settings.md
      - Diagnostics: admin-console/diagnostics.md
      - API Keys: admin-console/api-keys.md
      - Plugin Builder: admin-console/plugin-builder.md
      - Annotated Demo: admin-console/annotated-demo.md
    - Terminal: terminal.md
    - Tools:
      - Scripts & Tests: tools/scripts-and-tests.md
      - Node MCP Scripts: tools/node-mcp-scripts.md
      - API Tests: tools/api-tests.md
      - Phaxio E2E Test: tools/phaxio-e2e-test.md
    - Troubleshooting: troubleshooting.md
    - Third-Party: third-party.md
  - Apps:
    - Overview: apps/index.md
    - iOS: apps/ios.md
    - Desktop (Electron): apps/electron.md
  - Developers:
    - Backend Internals: developers/developers-backend.md
    - AGENTS.md Audit: developers/agents-audit.md
    - v3 Phase Status: developers/v3-phase-status.md
  - Archive:
    - MCP Integration (Legacy): archive/mcp-integration-legacy.md
    - Backends (Overview): archive/backends-overview.md
