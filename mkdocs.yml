site_name: Faxbot Docs
site_url: https://docs.faxbot.net
repo_url: https://github.com/DMontgomery40/Faxbot
repo_name: DMontgomery40/Faxbot
edit_uri: edit/mkdocs/docs/
theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/images/favicon-32x32.png
  logo: assets/images/faxbot_full_logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
plugins:
  - search
  - mike
  - exclude:
      glob:
        - 'api/admin_ui/node_modules/**'
        - 'api/**/node_modules/**'
        - 'vendor/**'
        - 'node_modules/**'
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - AI Integration: mcp/index.md
  - Backends:
    - Phaxio: go-live/phaxio.md
    - Sinch: go-live/sinch.md
    - SIP/Asterisk: go-live/sip-asterisk.md
  - SDKs: sdks/index.md
  - Deployment: DEPLOYMENT.md
  - Troubleshooting: troubleshooting.md
  - Third-Party: third-party.md
  - Apps:
    - Overview: apps/index.md
    - iOS: apps/ios.md
    - Desktop (Electron): apps/electron.md
  - Security:
    - Overview: security/index.md
    - Authentication: security/authentication.md
    - OAuth/OIDC Setup: security/oauth-setup.md
  - Admin Console: admin-console.md
  - Guides:
    - Images & PDFs: guides/images-and-pdfs.md
  - Tools:
    - Scripts & Tests: tools/scripts-and-tests.md
  - Terminal: terminal.md
  - API: api.md
  - API (Advanced):
    - Canonical Events: api/canonical-events.md
