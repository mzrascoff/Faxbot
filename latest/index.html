<!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting</title>
<noscript><meta http-equiv="refresh" content="0; url=/4ee1fb94/" /></noscript>
<script>
(async function(){
  try{
    const res = await fetch('/versions.json', { cache: 'no-store' });
    if(res.ok){
      const vers = await res.json();
      const entry = vers.find(v => Array.isArray(v.aliases) && v.aliases.includes('latest'));
      const v = (entry && entry.version) || '4ee1fb94';
      const p = location.pathname.replace(/^\/?latest\//,'');
      location.replace('/'+v+'/'+p+location.search+location.hash);
      return;
    }
  }catch(e){}
  // Fallback
  const p = location.pathname.replace(/^\/?latest\//,'');
  location.replace('/4ee1fb94/'+p+location.search+location.hash);
})();
</script></head><body>Redirecting...</body></html>
