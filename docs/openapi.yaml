openapi: 3.1.0
info:
    title: Faxbot API
    description: The first and only open-source, self-hostable fax API. Send faxes with a single function call.
    contact:
        name: Faxbot Support
        url: https://faxbot.net/
        email: support@faxbot.net
    license:
        name: MIT
        url: https://github.com/dmontgomery40/faxbot/blob/main/LICENSE
    version: 1.0.0
paths:
    /health:
        get:
            summary: Health
            operationId: health_health_get
            responses:
                "200":
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                type: object
            description: Health
    /health/ready:
        get:
            summary: Health Ready
            description: |
                Readiness probe. Returns 200 when core dependencies are ready.
                Checks: DB connectivity; backend configuration; storage configuration when inbound is enabled.
            operationId: health_ready_health_ready_get
            responses:
                "200":
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                type: object
    /admin/config:
        get:
            summary: Get Admin Config
            description: |
                Return sanitized effective configuration for operators.
                Does not include secrets. Requires admin auth (bootstrap env key or keys:manage).
            operationId: get_admin_config_admin_config_get
            parameters:
                -
                    name: x-api-key
                    in: header
                    required: false
                    schema:
                        title: X-Api-Key
                        type:
                            - string
                            - "null"
                    description: API key for authentication
            responses:
                "200":
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                type: object
                "422":
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: #/components/schemas/HTTPValidationError
    /admin/providers:
        get:
            summary: Get Admin Providers
            operationId: get_admin_providers_admin_providers_get
            parameters:
