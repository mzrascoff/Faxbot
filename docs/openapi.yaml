            description: Get Admin Providers
    /admin/settings:
        get:
            summary: Get Admin Settings
            description: Return effective settings with sensitive values masked.
            operationId: get_admin_settings_admin_settings_get
            parameters:
                -
                    name: x-api-key
                    in: header
                    required: false
                    schema:
                        title: X-Api-Key
                        type:
                            - string
                            - "null"
                    description: API key for authentication
            responses:
                "200":
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                type: object
                "422":
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: #/components/schemas/HTTPValidationError
        put:
            summary: Update Admin Settings
            description: |
                Apply configuration updates in-process by setting environment variables and reloading settings.
                Note: For persistence across restarts, write these to your .env and restart the API.
            operationId: update_admin_settings_admin_settings_put
            parameters:
                -
                    name: x-api-key
                    in: header
                    required: false
                    schema:
                        title: X-Api-Key
                        type:
                            - string
                            - "null"
                    description: API key for authentication
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: #/components/schemas/UpdateSettingsRequest
            responses:
                "200":
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                type: object
                "422":
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: #/components/schemas/HTTPValidationError
