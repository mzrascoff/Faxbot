name: Build and Deploy MkDocs (mike)

on:
  push:
    branches: [ mkdocs ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mike mkdocs-exclude

      - name: Configure Git author
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Deploy docs with mike to gh-pages
        run: |
          mike deploy --push --branch gh-pages latest "Latest"
          mike set-default --push --branch gh-pages latest

