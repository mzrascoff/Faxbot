name: mkdocs-deploy
on:
  push:
    branches: [ "mkdocs" ]
permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy with mike (gh-pages -> latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git rev-parse --short "$GITHUB_SHA")
          mike deploy --branch gh-pages --remote origin --push --update-aliases "$VERSION" latest
          mike set-default --branch gh-pages --remote origin --push latest
